name: "Exemple de workflow docker"
on:
  push:
    branches:
      - main

jobs:
  greet-user:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Exécuter l'action Docker
      uses: ./.github/actions/my-custom-action-docker
      with:
        message: "Salut de l'action Docker"